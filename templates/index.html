<!DOCTYPE html>
<html>
<head>
    <title>Secure Storage</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter';
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
            text-align: center;
        }

        .box {
            max-width: 450px;
            padding: 40px;
        }

        h1 {
            font-size: 42px;
        }

        p {
            margin: 20px 0;
            font-size: 17px;
            opacity: 0.9;
        }

        .btn {
            padding: 14px 26px;
            border: none;
            border-radius: 12px;
            background: white;
            color: #4facfe;
            font-weight: 600;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .features {
            margin-top: 25px;
            font-size: 14px;
        }

        .features span {
            display: block;
            margin: 6px 0;
        }
    </style>
</head>

<body>

<div class="box">
    <h1>🔐 Secure Storage</h1>

    <p>
        Protect your sensitive files with advanced encryption.<br>
        Fast, reliable, and secure.
    </p>

    <a href="/dashboard">
        <button class="btn">Enter Dashboard →</button>
    </a>

    <div class="features">
        <span>✔ AES Encryption</span>
        <span>✔ Password Protected</span>
        <span>✔ Smart City Ready</span>
    </div>
</div>

</body>
</html>

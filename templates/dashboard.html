<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter';
            background: #f1f5f9;
        }

        .navbar {
            height: 60px;
            background: #1e293b;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            color: white;
        }

        .nav-links a {
            margin-left: 20px;
            text-decoration: none;
            color: #cbd5e1;
        }

        .nav-links a:hover {
            color: white;
        }

        .main {
            padding: 30px;
        }

        .stats {
            display: flex;
            gap: 20px;
        }

        .card-stat {
            flex: 1;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        .content {
            margin-top: 20px;
            display: flex;
            gap: 20px;
        }

        .card {
            flex: 1;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            background: #3b82f6;
            color: white;
            cursor: pointer;
        }

        .activity {
            margin-top: 20px;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="navbar">
    <div>🔐 Secure</div>
    <div class="nav-links">
        <a href="/dashboard">Dashboard</a>
        <a href="/">Home</a>
    </div>
</div>

<div class="main">

    <div class="stats">
        <div class="card-stat">
            <h3>Files Encrypted</h3>
            <p>{{ encrypt_count }}</p>
        </div>

        <div class="card-stat">
            <h3>Files Decrypted</h3>
            <p>{{ decrypt_count }}</p>
        </div>

        <div class="card-stat">
            <h3>Security Level</h3>
            <p>High 🔒</p>
        </div>
    </div>

    <div class="content">

        <div class="card">
            <h3>Encrypt File</h3>
            <form action="/encrypt" method="post" enctype="multipart/form-data">
                <input type="file" name="file" required>
                <input type="password" name="password" placeholder="Password" required>
                <button>Encrypt</button>
            </form>
        </div>

        <div class="card">
            <h3>Decrypt File</h3>
            <form action="/decrypt" method="post" enctype="multipart/form-data">
                <input type="file" name="file" required>
                <input type="password" name="password" placeholder="Password" required>
                <button>Decrypt</button>
            </form>
        </div>

    </div>

    <div class="activity">
        <h3>Recent Activity</h3>
        <ul>
            {% for act in activity %}
                <li>{{ act }}</li>
            {% endfor %}
        </ul>
    </div>

</div>

</body>
</html>
